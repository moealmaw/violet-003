              - generic [ref=e58]:
                - paragraph [ref=e59]: She studied at Hastings College of Art under Leslie Badham and Philip Cole, and later at the Slade School of Fine Art.
                - paragraph [ref=e60]: "The decade carried her through golf, tennis, skiing, dancing, suitors, and letters: a social world that was warm, lively, and sought-after."
              - paragraph [ref=e61]: She was the object of a number of suitors in her busy schedule of art school, golf, tennis, skiing, and dancing.
