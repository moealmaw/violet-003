                  - heading "India" [level=2] [ref=e71]
                - paragraph [ref=e72]: The Raj Years & Marriage
              - generic [ref=e73]:
                - paragraph [ref=e74]: Kenelm George Digby proposed multiple times before she finally accepted in 1926, and she returned to India as a senior Memsahib of the Raj.
                - paragraph [ref=e75]: A dozen or so paintings survive from the Central Provinces and South of France. Venetia was born in 1930 and died in infancy; Simon was born in 1932. She studied with André Strauss at École des Beaux-Arts and attended Fontainebleau summer school in 1939, while the Hospitality League occupied the war years. Kenelm died suddenly of apoplexy in 1944.
              - paragraph [ref=e76]: Many paintings were lost on her return from India after World War Two.
