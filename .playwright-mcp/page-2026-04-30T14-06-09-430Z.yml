                  - heading "The End" [level=2] [ref=e115]
                - paragraph [ref=e116]: Final Chapter
              - generic [ref=e117]:
                - paragraph [ref=e118]: Financially stretched by the Kashmir expeditions, she was involved in a minor traffic incident in London on 13 August 1960, when a child grazed a knee on her car.
                - paragraph [ref=e119]: A police summons followed days later. After a doctor's prescription of barbiturates, she took most of the pills on 2 September 1960, left a note to Simon, and switched on the gas.
              - paragraph [ref=e120]: The section remains quiet and measured, returning to the work rather than the death.
