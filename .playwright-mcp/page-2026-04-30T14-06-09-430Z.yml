                  - heading "St Ives" [level=2] [ref=e91]
                - paragraph [ref=e92]: St Ives Colony
              - generic [ref=e93]:
                - paragraph [ref=e94]: Drawn to the colony of artists in St Ives, Cornwall, she joined the St Ives Society of Artists in 1946 and owned a cottage there.
                - paragraph [ref=e95]: She painted in Norway with Simon in 1950, wrote to Prime Minister Jawaharlal Nehru to request access to Kashmir, and received a reply within a fortnight. Two long stays on a houseboat on Dal Lake followed in 1952/3 and 1957/8, where she painted from a shikara on rivers and canals. Kashmir paintings later appeared on the cover of Kashmir magazine.
                - paragraph [ref=e96]: Her exhibitions ranged across StISA, the Paris Salon, the Pastel Society, the Royal Institute of Oil Painters, Delhi, and the Nehru Centre; she also planned to move to Jersey with her brother Lewis and sister-in-law Enid Carnell.
              - paragraph [ref=e97]: She often avoided unwanted attention by painting from a shikara on the rivers and canals.
