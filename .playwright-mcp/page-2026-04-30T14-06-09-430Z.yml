              - generic [ref=e38]:
                - paragraph [ref=e39]: Violet M. Digby, née Kidd, was born in 1900. Her father, William Kidd, was a Scottish draftsman-engineer, and the family moved to Bombay when she was five.
                - paragraph [ref=e40]: The work of the engineering company Lowther and Kidd, the family's European interlude with the Carnell family in Brittany in 1907, and the aircraft factory years in England in 1914 formed the early geography of her life.
              - paragraph [ref=e41]: Painting had been a leisure pursuit in her family for many generations.
